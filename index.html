ve to live with the monster, we must study its effects. Firstly, the belief that the great boom in television's popularity is 20 destroying the art of conversation - a widely-held middle-class opinion seems to be false. How many conversations does one hear prefaced with the remarks, 'Did you see so-and-so last night? Good, wasn't it!, which suggests that television has had a beneficial rather than detrimental effect on conversational habits; at least people have 25 something to talk about! Secondly, it is said to be broadening people's horizons by introducing them to new ideas and activities - ideas which may eventually lead them into new hobbies and pastimes. In the last few years, there has been a vast increase in educational programmes, from the more serious Open University, to Yoga and the joys of 30 amateur gardening. Already, then, people have a lot to thank the small screen for, and in all probability the future will see many more grateful viewers who have discovered new pursuits through the telly's inventive genius. Television, the most important invention of the twentieth century, is 35 bound to be exerting a major influence in the life of the modern man. That it will also continue to grow in popularity as the years go by is virtually certain."},{"title":"FAIR PLAY FOR WOMEN'S FOOTBALL","text":"FAIR PLAY FOR WOMEN'S FOOTBALL The Football Association (F. A.) has always been rather traditional in its administration of the game. In 1921 its members elected to ban women from playing football; they didn't say women were not capable of playing football, just that they wouldn't be allowed to play on proper fields with qualified officials in any organised way. And once in force, that rule was rigidly applied for 49 years. What broke down the resistance of the F.A. to women's football was the 1966 World Cup. Female teams began to appear everywhere and within three years established teams were playing football in structured leagues. The Women's Football Association (W.F.A.) was formed in 1969 with 51 clubs as members, and the F.A. revoked its infamous ban in 1970 in the face of strong W.F.A. representation. Other countries followed Britain's example and in 1971 international football bodies F.I.F.A. and U.E.F.A. decided that their members must not only recognise the women's game but take steps to see that it be properly controlled. The first England international women's team was picked in 1972 and won its first game (against Scotland) 3-2. The W.F.A. has now got a domestic membership of 200 clubs playing in 23 leagues. Managers of men's clubs often complain about foreign clubs buying their best players. Well, the same thing happens in women's football. In Italy they play women's football professionally and have bought many of the star players. Sallie Jackson of Fulham and Millwall's Shauna Williams are two of the best players who have gone to play in Italy. 'When a woman has no prospect of getting a job, and is offered the chance to do something she loves- and get paid for it - who can blame her?' commented league official Flo Bilton. Nowadays, in some schools boys and girls can play football together in their school team. You may have seen recent stories about girls who are star players in their boys' school team, but they cannot play in important official games because the F.A. won't allow them to play. F.A. Secretary Ted Croker is coming under increasing pressure from girl players who are angry at being dropped. At senior level women's football differs from the men's game in that the emphasis is on skill rather than strength, on stylish play instead of aggression. Apart from that it is remarkably similar - with the same complaints about fouls, foul language on the field and foul fields."},{"title":"FIRST TO SKI CROSS CONTINENT","text":"FIRST TO SKI CROSS CONTINENT \"NOTHING, NOTHING, nothing giving you protection.\" These words belong to the adventurer Reinhold Messner of Antarctica, who crossed it without the help of dogs or machines, Messner was the first man who reached the top of Mount Everest alone without bottled 5 oxygen. His companion was Arved Fuchs of Germany, the first man to reach both Poles on foot in the same year. The Canadian company Adventure Network ensured that they would support them from air until their starting point. But after arriving at the Canadian camp at Patriot Hills, the two men learned that there was not 10 enough fuel to transport them to the Filchner Ice Shelf, their planned starting point. Instead, they had to set out from the inland edge of the Ronne Ice Shelf. On November 13, 1989, Messner and Fuchs set out on skis. A day later a stiff wind carried off Messner's rubber sleeping pad, which was 15 used as a barrier between him and the icy ground. Four days later they lost their mileage indicator, forcing them to depend on other means to guess the distance they travelled each day. Bad weather, poor radio communication, and difficulty crossing giant fields of ice and snow slowed their arrival at their first supply place at the Thiel Mountains. By 20 the time they arrived, on December 6, Fuchs's feet were suffering from ill-fitting ski boots. Messner complained to their Canadian suppliers: \"If I were alone, I could go twice as fast.\" In his diary entry of November 24, he. had spoken more sympathetically of Fuchs's feet: \"Sore and suffused with blood so badly that even his feet cannot be seen. Every 25 step he takes hurts him .\" Next stop : the South Pole, where they arrived early on New Year's Eve. They were near U.S. Amundsen-Scott Station. Five Americans from the station welcomed them. For Messner it was a moment of mixed emotions: \"You ski a thousand kilometers through complete 30 stillness and vastness, and suddenly you see domes, containers, and masts.\" As for Fuchs, he was \"happy just to be there .\" They left three days later, following the general route across the Polar Plateau, through the Transantarctic Mountains, then onto the Ross Ice Shelf. Because of his sore feet, Fuchs often arrived more than an hour late to camp. Messner didn't want to wait so he preferred to put up the tent by himself. It was a difficult procedure in the high winds. Their occasional use of parachute sails increased their daily mileage. Once, before the Pole, Messner lost control of his sail, fell, and cut open his"},{"title":"EXPLORERS OF AMERICA","text":"EXPLORERS OF AMERICA For many years people believed that Europeans were the first to travel to America and that it was discovered by the Italian explorer Christopher Columbus. But, in fact, many travellers had reached America before him. Some historians claim that sailors from China crossed the Pacific to Mexico in AD 460. According to others, although there is not enough evidence, Asians other than the Chinese crossed the Bering Strait to Alaska long before this date and moved through North America on to South America. Irish explorers may also have visited America in the ninth and tenth centuries. Irish people living in Iceland before the Norsemen, who came from Scandinavia, reached ii in the ninth century. They may have sailed from Iceland to America after the Norsemen arrived in Iceland. The Norsemen themselves may also have visited America. We learn this from their stories. They were used to sailing long distances. Some Norse stories tell of a Norseman called Bjarni Herjolfsson, who visited North America in AD 986. Another Norseman named Leif Ericsson probably lived for a time in Newfoundland in Canada and returned to Greenland. However, the first Western explorer whose success we can be sure about was Christopher Columbus. He left Spain on August 3, 1492, and on October 12th, he arrived in the Bahamas. Columbus thought he had arrived in the Indies, the name then used for Asia. That is why he called the people there Indians. He spent many weeks sailing around the Caribbean and then went back to Spain. He made several more voyages to the New World until 1504, though he never actually landed in North America. However, America was named after another Italian explorer, Amerigo Vespucci, who was a friend of Columbus' and who later explored the coastline of the New World. Amerigo Vespucci (1451-1512) was a successful Florentine businessman and navigator who was knowledgeable in geography and cosmography. He was also the financial representative of the Medici, who were influential people in the fifteenth century. It was mainly for these reasons that he got involved in various expeditions at the time , made acquintance of Columbus and was of great help to hirr Although he did not actually join in any of the Columbus expeditions, he was responsible for their organisation. He obtained the ships and the necessary supplies, such as food. Vespucci's own expeditions took place at a later date. To find answers to the questions raised by Columbus' claims to have reached"},{"title":"A ROSE-RED CITY","text":"A ROSE-RED CITY A rose-red city, half as old as time! These words describe the ancient, ruined city of Petra, hidden in the mountains of southern Jordan. The rose-red colour comes from the sandstone of the mountains into which caves, temples, tombs and monuments were built. Because it was surrounded by mountains, this beautiful city stayed undiscovered through the ages until the 18th century, when the archeologists found the way in. The first scientific investigation of the place, however, was possible towards the end of the following century. Today tourists can enter Petra through the same deep path, which twists for one mile through the mountain. At times, it is so narrow that the walls block out the sky leaving the traveller in complete darkness. At the end of the road the darkness suddenly turns into brilliant sunshine in the Wadi of Urn, where the magnificient columns of the 15 Treasury, Petra's most famous monument, tower up to the blue sky. The central city area lies in the Wadi Mousa and this is mainly where the most beautiful walls, steps, fountains and temples are found. Now the city lies quietly under the hot desert sun, and nobody lives there except the archeologists, museum keepers and guides and a small 20 number of Bedouin families who still inhabit the caves high up on the hillsides. And the tourists, of course, who come every year to see the ancient, secret city of rose-red stone. They listen carefully to the guides who tell them that Petra was once a wealthy city of the ancient world. It began as a watering place for the caravans and developed into an 25 important trading centre. The hills around Petra were settled in the fifth century B.C. by the people of an ancient tribe, the Edomites, who began to build the city. However, it was actually the Nabateans, who settled the Wadi Mousa in 310 B.C. that brought wealth and prosperity to the city. They built 30 beautiful temples to worship the sun and made delicately painted pottery. They also established a well-developed administrative system to live in peace. A long-line of Nabatean kings came to an end in 106 AD, when Petra was occupied by the Romans and became part of the Roman province of Arabia. At first, the city flourished under Roman 35 administration. The Romans built beautiful monuments and made new improvements to the city, such as the Collonade Street, which is very famous among archeological circles. However, as the economy of the whole eastern area began to change, the trade routes disappeared and Petra declined. By the sixth century AD, there was no longer any 40 mention of Petra in ancient writings."},{"title":"STUNTPEOPLE","text":"STUNTPEOPLE Would you jump off the Great Wall of China for £300 a day? A stuntperson is a man or woman who does all the dangerous acting work in films. This can be anything from a simple fall into a swimming pool, to jumping from the top of a very tall building. It sounds like a crazy job that you'd have to be mad to try, but there are actually lots of people who want to do it. Sarah Franzi, twenty-four, is one of Britain's sixteen professional stuntwomen. (There are a hundred and sixty stuntmen in the country.) We asked Sarah how she came to be a stuntwoman. \"From when I was young I'd trained to be a dancer, and for seven years after school I was rarely out of work. But a dancer's professional life is pretty short, and my father suggested I should think about doing stunt work after I'd given up dancing. I thought about it for the next two years. Then I decided to take the risk and started the training course. For six months, I worked really hard every day, all day. I had to learn different skills - sub-aqua, sky-diving, horse-riding, etc.\" Sarah finished the course and applied to the Stunt Committee (the group which decides whether you're accepted as a professional stuntperson or not). Two weeks after she was accepted, Sarah was throwing herself off the Great Wall of China in Superman IV. \"I was very lucky to get work so quickly. I had a small part, playing a tourist who fell off the Wall after an earthquake. The tourist was rescued from death by Superman, of course. Actually, I fell 25 metres onto cardboard boxes! You can't use anything softer than those. like mattresses for instance, because you'd bounce back up into view of the camera. Instead, you just have to learn to fall properly. It's quite dangerous but I enjoy taking risks which are part of the job. HOW TO BECOME A STUNTPERSON To be accepted as a stuntperson, you have to be between 18-30 years old and a full member of Equity, The Actors' Union. You also have to reach a very high standard in at least six of the skills listed below. They should fall within at least three of the groups, but not more than two of the skills should fall within any one group. The groups are: Group A - Fighting Group B - Falling Fencing, Boxing Diving Judo or Wrestling Parachuting"},{"title":"FRIENDSHIP","text":"FRIENDSHIP Friends play an important part in our lives, and although we may take the fact of friendship for granted, we often don't clearly understand how we make friends. While we get on well with a number of people, we are usually friends with only a very few - for example, the average among students is about 6 per person. Moreover, a great many relationships come under the term 'friendship'. In all cases, two peopie like one another and enjoy being together. However, the degree of closeness between them and the reasons for their mutual interest vary greatly. In other words, there are many reasons for why two people share the same interest in each other. At the very beginning, much depends on how people meet and on positive first impressions. As we get to know peopie, we take into consideration things like age, physical attractiveness, economic and social status and intelligence. Although these factors may not seem very important, it is difficult to be friends when there is a big age difference or when the backgrounds are different. As we get closer, we become interested in actual behaviour, facial expression and tone of voice. Friends will stand closer together and will spend more time looking at each other than people who just know each other. Smiles and soft voices also express friendliness. It is because they may send out the wrong signals that shy people often have difficulty in making friends. To illustrate, their nervousness may be mistaken for unfriendliness. People who do not look at the eyes of those they are speaking to are not trusted. However, those people may simply lack confidence. Some relationships become stronger with argument and discussion, but usually intimate friends have similar ideas and beliefs and share the same attitudes and interests. Although some people become close friends immediately, it usually takes time to reach this point. The more intimate people become, the more they rely on one another. People want to do friends favours and hate to disappoint them. There are no friendship ceremonies but the support and understanding that results from shared experiences and feelings seems to create a powerful relationship which can overcome differences in background and age."},{"title":"AMERICAN CITIES","text":"AMERICAN CITIES We can trace all the problems of the American cities back to one starting point: we Americans don't like our cities very much. That is strange. More than three-fourths of us now live in cities, and more are flocking to them every year. We are told that the problems in our cities are receiving more attention in Washington. However, it is historically true: in the American psychology, the city has been a basically suspect institution. Americans have related urban areas to Europe, which they believed to be full of dishonesty and illegal behaviour. Moreover, they believed that cities lacked spaciousness and innocence, so easily found in rural areas. Therefore, it can be said that a strong anti-urban attitude runs through American thinking. The settlement of America was a reaction to the harsh conditions in European industrial centres. People came to America because there was available land and they wanted to escape from the bad influences of the cities. What has this got to do with the unpleasant situations of the modern cities? I think it has a lot to do with it. The United States has never thought that the American cities were worthy of improvement. It was believed that cities should support themselves. The reason behind this is not directly the result of a 'the city is evil, and therefore, we will not help it1 attitude. It is more indirect. Billions of dollars are spent to preserve the family farms but nothing is done about an effective programme for jobs in the cities. In addition, although there have long been government agencies which deal with agriculture, small business, veterans and commerce, the Department of Urban Development wasn't set up until 1965. Now consider this: the most important housing law was not the law that provided public housing; it was the law which provided low-interest mortgages for Americans who wanted to buy a home. More than anything, this made the suburban dream a reality. 800,000 middle-class New Yorkers left the city for the suburbs dreaming of grass and trees and a place for their children to play in. They were replaced by unskilled workers, who represented a further cost to the cities. In other words, the world of urban America has become a dark place which doesn't deserve support or help in the minds of Americans."},{"title":"FREE TRADE","text":"FREE TRADE In the nineteenth century, economists believed that there were limits to human wealth. In their opinion, when one man became richer, another grew poorer. If a country wished to improve its standard of living, it had to export more than it imported. So, in Britain, the main argument in those days was about free trade and protectionism. The owners of the Lancashire textile factories naturally supported free trade because they wanted to export as many products as possible. In their view, it would be better for the country if they sold more goods to other countries. The landowners and farmers, on the other hand, were afraid of foreign competition. Free trade won because Britain at that time was able to buy as many cheap raw materials as it needed from its colonies and sell them again as finished goods. Import controls would have damaged its position as the strongest manufacturing nation in the world. In America, a similar belief in free trade eventually led to a crisis in economy - the Wall Street crash, in 1929. People in the USA were benefiting from the expansion of the American economy in the First World War. They became convinced that money automatically makes more money and speculative investments are always profitable. When they lost confidence in the stock market, the effects of the 'crash' were felt all over the world. Following the Wall Street crash, the economist John Maynard Keynes introduced a new theory. In simple terms, his solution to the problem was that there is no fixed limit to human wealth. Factories can always produce more if people can afford to buy the goods. Therefore, governments must help factories and create jobs, and the factories must pay good wages. In this way, every worker becomes a consumer. For a time, especially after the Second World War, Keynes's theory was successful. It kept the factories working and maintained full employment. In the 1970s, however, several unpleasant facts emerged. For one thing, we began to realise that the world's resources are limited. We cannot go on producing more and more because we are using up our resources too fast. Secondly, more efficient production is often achieved with fewer workers and bigger machines, not the other way round. Above all, the industrialised nations of the world consume more of the world's resources than they produce. But it is difficult to make people economise when they think that they create more unemployment by spending less money."},{"title":"BRITISH UNIVERSITIES","text":"BRITISH UNIVERSITIES There are 44 universities in Britain. These are divided into three types: the old established universities, such as Oxford (founded 1249), Cambridge and Edinburgh. Oxford and Cambridge together are often called Oxbridge; the 19th century universities such as London and Manchester; the new universities established after World War IT, such as Essex, Lancaster, The New University of Ulster. Characteristics of the universities: The old universities consist of a collection of independent colleges. Together they form the university, which is governed by a senate, the main decision-making body in the university. Some 19th century universities have a combination of independent colleges and research institutes. London University is an example. Other universities developed during the 19th century out of single university colleges in provincial cities. Because their original buildings were often built of brick, they are sometimes called 'redbrick' universities. The new universities were founded after World War II because the demand for higher education had increased. So many more people wanted to study for a degree after 1945 that even the building of new universities did not solve the problem. In certain areas of the country, the existing colleges of technology and other further education colleges were combined to form polytechnics. Thus, Britain was able to meet the increasing demand for higher education degrees. There are now 30 polytechnics, offering courses in the full range of subjects, from engineering to art. The Council of National Academic Awards (CNAA) supervises polytechnic examinations and makes sure that a high standard is maintained in all polytechnics. Some special features of British university life: Over 90% of full-time students receive grants from public or private funds. The grants are paid towards tuition and living costs. Higher education is free for those people whose parents' income is below a certain level. Degree courses, leading to a B.A. or B.Sc, usually take three years. It is almost impossible to move from one university to another during a degree course, but if you do that, you will have to begin the course again. University students attend lectures.They also attend tutorials. These are discussion classes for a small group of students. In these classes, a tutor sets work for his students. Then, the teacher and the students get together every week or fortnight to discuss and criticise the work done by each student."},{"title":"WELCOME TO PRESTEL","text":"WELCOME TO PRESTEL Among the latest developments in telecommunications are viewdata systems which use both telephone and television. The extract below is from a brochure advertising \"Prestel\". Prestel is the first of a new kind of information service. It is currently being used by thousands of customers in Britain and overseas, large businesses, small firms, colleges, farms, hotels, high street shops and in a growing number of private homes. They find Prestel a quick and very easy way to get the information they need every day, as well as offering powerful two-way communications. An adapted television set and an ordinary telephone line link Prestel customers to an enormous range of computer-held information. To call up an item from the thousands available, you simply press the numbered buttons on a keypad the size of a pocket calculator. The information on Prestel is organised in 'pages' - a page is a screenful of information. As soon as you ask for a particular page, the computer sends it instantly down the telephone line and it appears on the screen of your set. Prestel can store hundreds of thousands of pages, but finding the information is easy. There are special index pages on Prestel to help you, and also printed directories. You can learn how to use the system in a few minutes without any special training. The information on Prestel is supplied by hundreds of independent organisations called Information Providers, who are in direct contact with the central computer and edit their pages to keep them constantly up-to-date. Prestel is, therefore, an important medium for fast-changing information like foreign exchange rates, the availability of airline seats, or the latest sports results. It can, of course, bring you business information, the latest news, detailed guides to the countries of the world, office space to rent, theatre and cinema guides, and more. The first group of people to take to Prestel in a big way were travel agents, and there are now over 200 tour operators, ferry companies and airlines on Prestel detailing fares, timetables and up-to-date availability, all at the press of a button. Such information can be very valuable when planning holidays and business trips. With its vast range of topics, Prestel can be thought of as an electronic publishing medium. But it is more than that. As well as receiving information, users can send messages to each other on a special computer. They can also send messages to Information Providers using Response Pages. This allows them to order goods via Prestel, book a hotel room, or reserve a seat at the theatre."},{"title":"ENERGY-EFFICIENT BUILDINGS","text":"ENERGY-EFFICIENT BUILDINGS Architects, builders, construction managers and corporate planners are beginning to realise that energy-efficient buildings are not only politically correct but they are also cheaper to operate and offer a healthier environment for workers. These advantages are being demonstrated by such structures as the Natural Resources Defense Council headquarters in New York City, the Environmental Defense Fund building in Washington, the Internationale Nederlanden Group Bank in Amsterdam and a regional government centre now under construction in Marseilles. Even the famous Wal-Mart chain is getting in on the act. The retailer is designing an 'environmental store' in Lawrence, Kansas, that could become the prototype for all future Wal-Marts. This first model will be built mostly of wood and concrete block-materials that require 33% less energy to produce than steel, and feature an elaborate, high-efficiency lighting system enhanced by skylights that use holographic films to spread daylight evenly over the space. The store will have its own recycling centre so that shipping boxes never have to leave the site. And for the ultimate in recycling, the entire structure is designed to be converted easily to housing in the event that Wal-Mart decides to leave the building. The motivation for going green is sometimes idealistic, sometimes materialistic and usually a little of both. There is no question that traditional office structures are environmentally wasteful and destructive. In the U.S., such buildings account for one-third of the nation's peak electricity consumption: they are costly to operate and will become even more so when new energy taxes go into effect. Furthermore, office air conditioners, together with the manufacturing processes used to make building materials, emit nearly one-quarter of all ozone-depleting chlorofluorocarbons. Of more immediate concern to workers is the miserable quality of the air they breathe. Because of their design and the synthetic materials they employ, between one-third and one-half of all commercial buildings are filled with polluted air, in some cases 100 times as polluted as the air on the other side of the windows. As awareness of such problems grows, so does the movement to go green. The headquarters of the National Audubon Society is another example of energy-efficient buildings. It carries a little more than half the air conditioning capacity that the buildings of its size have. Furthermore, the building employs the latest lighting technology, including tiny sensors that adjust office illumination depending on whether or not people are actually using the room and how much light"},{"title":"AUTOMATION","text":"AUTOMATION Automation is a component of technology. Technology, on the other hand, is the application of science to daily life. Man lived hundreds of thousands of years without it, until the Industrial Revolution in the eighteenth century. But 90 per cent of the people lived in poverty then. Since the first Industrial Revolution, and during the present day 'automation revolution', the number of people who live in poverty in the industrialised countries has fallen to about 20 per cent. Although technology solves many problems, it also creates many new ones. In the first place, new technology is necessary to correct the harmful effects of previous technology; for example, if 'after burners' were made for automobile exhausts, air would be as clean as it was before the automobile polluted it. Secondly, a new technology may be possible but not economical, as in the case of solar energy. Thirdly, nearly all forms of technology can be for the good of man. But unless technological advances are clearly understood, they can do more harm than good. This is also true for automation. Furthermore, mass production techniques have produced a dependency on machines, which hasn't been full recognized yet. Although living standards in the industrialized world are the highest in history, much of industry has become dependent on automated machinery, and people have become dependent on its products, such as washers, dryers and automobiles. 1. When did man begin to apply science to daily life? 2. Are 'after burners' being used in automobiles at present? 1. Correct the statements below. a) Only 20% of the people in the world are poor. b) Solar energy is being used widely because it is both possible and economical."},{"title":"TYPHOONS","text":"TYPHOONS Typhoons destroy about 1.5% of the national product of South East Asian countries every year. Much of this damage cannot be avoided, even using the most modern technology. However, because of the need to give people as much warning as possible, an international network of meteorological stations keeps watch on the movement of typhoons. A typhoon warning centre, established by the UK on the island of Guam in 1959, regularly sends aircraft into suspected storm areas to measure winds, movement and pressure. Orbiting continuously around the world, satellites take pictures and plot changes in the direction of storms. However, problems still remain because 24-hour forecasts of storm movements can be inaccurate by as much as 100 miles, and 3-day predictions are often 300 miles off course. For example, in 1960 Typhoon Mary appeared to be heading for land about 70 miles west of Hong Kong, but it changed course during the night and smashed through the centre of the area in the early hours of the morning. This typhoon left 11 people dead, 11 missing, 130 injured and about 300 boats sunk or wrecked. Another example is Typhoon Vera, which crashed across Taiwan on August 1, 1977. It left 38 people dead and 175 injured, and crippled the seaport city of Keelung. Power supplies to about 60% of Taipei's two million people were cut for about two days and the enormous gales flattened 54 houses. They partially damaged another 50 in the island's northern and central areas. Among other effects, two major fires broke out in Taipei City and one of these burned down 5 stores. Needless to say, the cost of all this damage was enormous and disasters of this kind are unfortunately repeated many times a year throughout the world. Control of typhoons lies in understanding them better. Good predictions are a method of control because action can be taken to limit their destructive force. For better understanding and improved predictions of typhoons, scientists must learn much more about tropical weather, and some major research projects, such as the Global Atmospheric Research Programme, begun in 1974, are now under way. Meteorologists also consider the possibility of modifying the typhoon's direction by seeding hurricane clouds to force them to release their rain before they would under normal conditions. However, researchers in Asia are doubtful about the advisability of interfering with typhoons although they cost the region a great deal in money and lives. They warn that because man does not yet have sufficient knowledge, he should not yet begin large-scale weather"},{"title":"THE OCEAN FLOOR","text":"THE OCEAN FLOOR Almost three-fourths of the earth is under the ocean. Until recently, people didn't know what the ocean bottom, or floor, was like. The ocean floor is substantially different from what we thought. After World War I, scientists made a new machine. This machine told them what the bottom of the ocean was like and told how deep the ocean is in each place. For a long time, many people thought the ocean floor was flat. Now we know that there are large mountains and deep holes on the ocean floor. There are three kinds of ocean floor under the water: the continental shelf, the continental slope, and the deep ocean floor. The continental shelf goes all around the continents. (The continents are North America, South America, Europe, Australia, Asia, Africa, and Antarctica.) The water is not more than 600 feet deep above the continental shelf. The sun can only shine down about 600 feet into the water. Plants and animals need sunshine to live so most of the fish in the ocean live above the continental shelf. The continental shelves were part of the continents many thousands of years ago. Later, the water came over them. That's why oil and minerals can be found in the continental shelf as well as in the land. Oceanographers are scientists who study the oceans. They think the continental shelves will be very important to us some day. They are trying to learn how to live and work under the water, at dephts of 500 feet or more. The continental slope begins where the continental shelf ends. At the edge of the continental shelf, the continental slope suddenly goes down two or three miles. Some continental slopes are like the side of a mountain; some are like a wall. All are very high. The largest one is five miles high, which is higher than any slope on the land. There are large canyons in the continental slopes. The canyons look like the Grand Canyon, but they are larger. The deep ocean floor, which is the real bottom of the ocean, begins at the end of the continental slope. It is the largest and deepest of the three kinds of ocean bottom and it makes up half of all the earth's surface. Oceanographers have found a large range, or line, of mountains called the Mid-Atlantic Ridge on the ocean floor. This mountain range is 10,000 miles long. It goes through the Atlantic Ocean from Iceland to southern Africa. Many of the mountains in this range are 10,000 feet"},{"title":"CONSUMER PRESSURE","text":"CONSUMER PRESSURE Consumer pressure is one of the natural phases of an advanced industrial society. As a society reaches a certain stage in development, concern over consumer issues makes itself felt. The United States led the way, other countries gradually followed suit. The Consumers' Union of the United States was founded in the 1920's; Ralph Nader began to make himself known as the American consumer spokesman in the 1960s when he attacked the American car industry in his book Unsafe at any Speed. He succeeded in getting certain cars withdrawn from sale to the general public. He followed this by investigating other areas where the consumer was at a disadvantage as a result of decisions by manufacturers, retailers or government. He has been spectacularly successful, largely because as a lawyer he knows how to function within the American legal system. His effect on British development has principally been as an example. Very close parallels cannot be drawn, because the British legal system is different. Until recently, confrontation and direct action has not been the British way of settling matters; settlement has been reached by gentlemanly chats and invitations to lunch and a visit to the works or factory afterwards. This combination of factors has a lot to do with the reasons why consumer action in this country has only come alive over the last decade or so. Nevertheless, inflation has also had a hand in it. The price of buying equipment for one's life and home comes to be questioned at a time of rapid inflation and uncertain economic growth. The goods and services are available in ever-increasing abundance but for many individuals the money doesn't go round them all. The pressure on incomes both from inflation and from the wide attractive range of goods on which money can be spent means that people begin to look more critically at prices. Having spent their money, they resent the occasions when there is some cause to complain about goods or services which do not come up to expectations. And on attempting to complain, they find themselves too often defeated by the stone wall of manufacturers' and retailers' indifference to complaints. So then consumer action started. People with a complaint wrote to a person whom they could identify in some way: their MP, a journalist, a broadcaster. As these letters continued to come in, the politicians and the media began to realise that there was a problem area, an area where people come up against difficulties which they cannot handle. In trying to sort out some of the complaints, they discovered just how difficult the situation is, how hard it is to complain, and how much specialised knowledge is required. This consumer protection action began to achieve a popularity it had never known before and began to attract support from the media and in Parliament."},{"title":"EVERYTHING MUST GO SOMEWHERE","text":"LAW OF CONSERVATION OF MATTER: EVERYTHING MUST GO SOMEWHERE We always talk about consuming or using up matter resources, but actually we don't consume any matter. We only borrow some of the earth's resources for a while - taking them from the earth, carrying them to another part of the globe, processing them, using them, and then discarding, reusing, or recycling them. In the process of using matter, we may change it to another form. But we can neither create nor destroy any measurable amount of matter. This results from the law of conservation of matter: In any ordinary physical or chemical change, matter is neither created nor destroyed but merely changed from one form to another. This law tells us that we can never really throw any matter away. Everything must go somewhere and all we can do is to recycle some of the matter we think we have thrown away. We can collect dust and soot from the smokestacks of industrial plants, but these solid wastes must then go somewhere. Cleaning up smoke is a misleading practice, because the invisible gaseous and very tiny particle pollutants left are often more damaging than the large solid particles that are removed. We can collect garbage and remove solid wastes from sewage, but they must either be burned (air pollution), dumped into rivers, lakes, and oceans (water pollution) or deposited on the land (soil pollution and water pollution if they wash away). We can reduce air pollution from the internal combustion engines in cars by using electric cars. But since electric car batteries must be recharged every day, we will have to build more electric power plants. If these are coal-fired, their smokestacks will add additional and even more dangerous air pollutants to the air; more land will be scarred from strip mining, and more water will be polluted from the acids that tend to leak out of coal mines. We could use nuclear power plants to produce the extra electricity needed. But then we risk greater heat or thermal pollution of rivers and other bodies of water used to cool such plants. Although we can certainly make the environment cleaner, talk of 'cleaning up the environment' and 'pollution free' cars, products, or industries is a scientific absurdity. The law of conservation of matter tells us that we will always be faced with pollution of some sort. Thus, we are also faced with the problem of trade-off. In turn, these frequently involve subjective and controversial scientific, political, economic, and ethical judgments about what is a dangerous pollutant level, to what degree a pollutant must be controlled, and what amount of money we are willing to pay to reduce a pollutant to a harmless level."},{"title":"THE PALEOLITHIC AGE","text":"1 THE PALEOLITHIC AGE Life in the Paleolithic Age was perilous and uncertain at best. Survival depended on the success of the hunt, but the hunt often brought sudden and violent death. In some instances, Paleolithic people were their own worst enemies. At times they fought each other for control of hunting grounds, and some early hunters played an important part in wiping out less aggressive people. On occasion Paleolithic people seem to have preyed on one another. One of the indications that Neanderthal Man was at times cannibalistic, that is, hunted human beings, comes from a cave in Yugoslavia, where investigators found human bones burned and split open. On the other hand, the people of the Paleolithic Age were responsible for some striking accomplishments. The most obvious one is the use of the stone implements that gave the period its name. The ability to make and use tools gave Paleolithic people the means to change their environment. They could compete with larger and stronger animals and could hunt animals faster and more ferocious than themselves. In the frozen wastes of the north, they hunted the mammoth, the woolly rhinoceros, and the reindeer. In milder southern climates, they hunted deer, squirrels, and rabbits. The demands of the hunt sharpened their intelligence. They supplemented their diet by collecting fruits, nuts, and seeds, and in the process they discovered the plant world around them. Paleolithic people learned to control fire and to make clothes from the skins of their prey: The most striking accomplishments of Paleolithic people were intellectual. The development of the human brain made possible thought and symbolic logic. An invisible world opened up to homo sapiens. Unlike animals, whose behaviour is the result of instinct, Paleolithic people used reason to govern their actions. Thought and language permitted the experience of the old to be passed on to the young. Paleolithic people produced the first art. They decorated the walls of their caves with paintings of animals and scenes of the hunt. They also began to fashion clay models of pregnant women and of animals. These first examples of art illustrate the way in which early men and women communicated to others their experience of the past and hope for the future. Many of the paintings, such as those at Altamira in Spain and Lascaux in France, are found deep in the caves, in areas not easily accessible. These areas were probably places of ritual and initiation» where young men were taken when they joined the ranks of the hunters."},{"title":"TRENDS","text":"TRENDS How will society change in the next century? Debbie Kent looks at some future trends. Forecasting the future is a risky business. But that doesn't mean we can't say anything about the next decade. In fact, one trend is almost completely predictable: population growth. The population of the UK, currently just over 57 million, is expected to keep rising to hit 59 million by 2001. Most significant is how the structure of that 59 million will change. The number of 16 to 19-year-olds has been falling since the baby boom generation reached adolescence in the early 1980's, and it will stay low through the 90's and into the next century. On the other hand, the proportion of older people will grow. By 2001 more than 45% of us will be over 50. Some implications for the next century are clear. Fewer school leavers and a workforce that is growing only slowly will have an impact on the labour market. Employers may have to look elsewhere to fill vacancies - to women with children and older people. At the other end of the scale, the growth in the number of elderly people means a fresh look at the idea of retirement. For the first time most of us can expect to have 30 years of retirement to look forward to. Although society will still be made up largely of conventional families, there is a growing trend for fewer stereotypical households: more homes will consist of single adults. Then there will be households split by divorce, mixed households of second marriages, and three generations living under one roof. The average household size is predicted to fall from 2.7 people to 2.4 people by 2001. Finance is one of the areas that is likely to undergo a fundamental change between now and the year 2001. If full European monetary union takes place, we could routinely be using 'ECU' or some other denomination of Euro-wide currency even for our spending at home. Will we be using money at all? The answer is almost certainly yes, for low-value transactions and for that small but intractable section of the population that does not have a bank account. But the cheque should be pretty much on the way out by 2001. According to Roger Taylor of Midland Payment Transmission Services, developers of payment card systems: \"Transactions will be primarily plastic-based but people won't carry as many credit cards. . So the walletful of plastic is likely to be replaced by a single multi-function card that will act as cheque book, credit card, cash dispenser and debit card. Haven't we got that already? The difference is that the 2001 version will be an"},{"title":"HOW TO STOP COMPUTER ABUSE","text":"HOW TO STOP COMPUTER ABUSE More and more, the operations of our businesses, governments, and financial institutions are controlled by information that exists only inside computer memories. Anyone clever enough to modify this information for his own purposes can reap substantial rewards. Even worse, a number of people who have done this and been caught at it have managed to get away without punishment. A recent Stanford Research Institute study of computer abuse was based on 160 case histories, which probably are just the tip of the iceberg. After all» we only know about the unsuccessful computer crimes. How many successful ones have gone undetected is anybody's guess. For the last decade or so, computer programmers have concentrated on making it easy for people to use computer systems. Unfortunately, in some situations the systems are all too easy to use; they don't impose nearly enough restrictions to safeguard confidential information or to prevent unauthorized persons from changing the information in a file. A computer system needs a sure way of identifying the people who are authorized to use it. The identification procedure has to be quick and convenient. Besides, it should be so thorough that there is little chance of the computer being fooled by a clever imposter, who dishonestly pretends to be an authorized user. At the same time, the computer must not reject legitimate users. Unfortunately, no identification system currently in use meets all these requirements. At present, signatures are widely used to identify credit-card holders, but it takes an expert to detect a good forgery. Sometimes even a human expert is deceived, and there is no reason to believe that a computer could do any better. A variation is to have the computer analyse a person's hand movements as he signs his name instead of analysing the signature itself. Advocates of this method claim that different persons' hand movements are sufficiently distinct to identify them. And while a forger might learn to duplicate another person's signature, he probably would not move his hand exactly the way the person whose signature he was forging did. Photographs are also sometimes used for identification. But, people find it inconvenient to stop by a bank or credit-card company and be photographed. Companies might lose business if they made the pictures an absolute requirement. Also, photographs are less useful these days, when people frequently change their appearance by changing the way they wear their hair. Finally, computer programmes for analysing photographs are still highly experimental."}]
;

// ─── STATE ────────────────────────────────────────────────────
let currentUnit = 0;
let currentWord = null;
let currentData = null;
let notebook = JSON.parse(localStorage.getItem('rw_notebook') || '[]');
let nbTab = 'verb';
let quizScore = 0, quizTotal = 0;

// ─── INIT ─────────────────────────────────────────────────────
function init() {
  buildDrawer();
  loadUnit(0);
  updateNbBadge();
}

function buildDrawer() {
  const list = document.getElementById('drawerList');
  PASSAGES.forEach((p, i) => {
    const saved = notebook.filter(w => w.unit === p.title).length;
    const el = document.createElement('div');
    el.className = 'drawer-item' + (i === 0 ? ' active-unit' : '');
    el.id = 'di-' + i;
    el.innerHTML = `<div class="di-num">ÜNİTE ${i+1}</div>
      <div class="di-title">${p.title}</div>
      ${saved ? `<div class="di-count">${saved} kelime kaydedildi</div>` : ''}`;
    el.onclick = () => { loadUnit(i); closeDrawer(); };
    list.appendChild(el);
  });
}

function loadUnit(idx) {
  currentUnit = idx;
  const p = PASSAGES[idx];
  document.getElementById('topUnitNum').textContent = 'ÜNİTE ' + (idx+1);
  document.getElementById('topUnitName').textContent = p.title;
  document.getElementById('unitTitle').textContent = p.title;
  document.getElementById('unitMeta').textContent = `${p.text.split(' ').length} kelime · Tıkla ve öğren`;

  // Highlight active drawer item
  document.querySelectorAll('.drawer-item').forEach((el,i) => {
    el.classList.toggle('active-unit', i === idx);
  });

  // Render clickable words
  const body = document.getElementById('textBody');
  const words = p.text.split(' ');
  body.innerHTML = words.map((w, i) => {
    const clean = w.replace(/[^a-zA-Z'\-]/g, '').toLowerCase();
    const saved = notebook.find(n => n.word.toLowerCase() === clean);
    const cls = saved ? 'word saved-' + saved.type : 'word';
    return `<span class="${cls}" data-w="${clean}" data-i="${i}" onclick="clickWord(this)">${w}</span> `;
  }).join('');

  document.getElementById('readingArea').scrollTop = 0;
  document.getElementById('prevBtn').style.opacity = idx === 0 ? '0.3' : '1';
  document.getElementById('nextBtn').style.opacity = idx === PASSAGES.length-1 ? '0.3' : '1';
}

// ─── WORD CLICK ───────────────────────────────────────────────
function clickWord(el) {
  const word = el.dataset.w;
  if (!word || word.length < 3) return;
  
  // Clear previous active
  document.querySelectorAll('.word.active').forEach(w => w.classList.remove('active'));
  el.classList.add('active');
  
  currentWord = word;
  currentData = null;
  
  const isSaved = notebook.find(n => n.word.toLowerCase() === word.toLowerCase());
  
  document.getElementById('popWord').textContent = word;
  document.getElementById('popType').className = 'popup-type type-loading';
  document.getElementById('popType').textContent = 'Analiz ediliyor...';
  document.getElementById('popBody').innerHTML = `<div class="popup-loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><span>Claude analiz ediyor...</span></div>`;
  
  const saveBtn = document.getElementById('saveBtn');
  if (isSaved) {
    saveBtn.textContent = '✓ Zaten Kaydedildi';
    saveBtn.className = 'save-btn saved';
  } else {
    saveBtn.textContent = '＋ Deftere Ekle';
    saveBtn.className = 'save-btn';
  }
  
  document.getElementById('popup').classList.add('open');
  analyzeWord(word);
}

async function analyzeWord(word) {
  // Yükleniyor ekranı
  document.getElementById('popType').className = 'popup-type type-loading';
  document.getElementById('popType').textContent = 'Gemini analiz ediyor...';
  document.getElementById('popBody').innerHTML = '<div class="popup-loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><span>Gemini düşünüyor...</span></div>';
  document.getElementById('saveBtn').style.display = 'none';

  // KENDİ GEMINI API ANAHTARINI BURAYA YAZ (Tırnaklar kalacak!)
  const GEMINI_API_KEY = "AIzaSyBs0ubMlleVCeMtsE6tmchREJvAq-_kJiE"; 

  const context = PASSAGES[currentUnit].text.substring(0, 500);
  
  const prompt = `You are a vocabulary analysis assistant for Turkish students studying English. Analyze the word "${word}" as used in this academic text context:

"${context}"

RULES:
1. If the word is a proper noun (person name, place name) or scientific/chemical formula: return type "SKIP".
2. If type is Verb, Adjective, Adverb, or Conjunction: analyze normally.
3. If the word is a Noun or any other word worth knowing (NOT a proper noun): return type "Other".
4. Skip ONLY extremely common words (the, a, an, is, are, was, were, be, have, has, do, did, will, would, in, on, at, to, for, with, from, by, and, or, but).
5. Return JSON only, no other text.

Return this exact JSON format:
{"type":"Verb|Adjective|Adverb|Conjunction|Other|SKIP","tr":"Turkish meaning (exam-relevant)","syn":["synonym1","synonym2"],"mnemonic":"Short funny/absurd mnemonic in Turkish based on pronunciation - max 20 words"}

If the word should be skipped, return: {"type":"SKIP"}`;

try {
    // Senin panelinde yazan modeli (gemini-2.5-flash) kullanıyoruz
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
    
    const resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { response_mime_type: "application/json" }
      })
    });
    
    const data = await resp.json();
    
    if (data.error) {
       throw new Error(data.error.message);
    }
    
    let text = data.candidates[0].content.parts[0].text;
    text = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(text);
    
    if (result.type === 'SKIP') {
      document.getElementById('popBody').innerHTML = '<div class="popup-error">Bu kelime sınav için önemli değil.</div>';
      document.getElementById('popType').textContent = 'GEÇ';
      document.getElementById('popType').className = 'popup-type type-loading';
      document.getElementById('saveBtn').style.display = 'none';
      return;
    }
    
    document.getElementById('saveBtn').style.display = '';
    currentData = { ...result, word: word.toLowerCase(), unit: PASSAGES[currentUnit].title };
    
    const typeClass = {'Verb':'verb','Adjective':'adj','Adverb':'adv','Conjunction':'conj','Other':'other'}[result.type] || 'other';
    const typeLabel = {'Verb':'FİİL','Adjective':'SIFAT','Adverb':'ZARF','Conjunction':'BAĞLAÇ','Other':'DİĞER'}[result.type] || result.type;
    
    document.getElementById('popType').className = 'popup-type type-' + typeClass;
    document.getElementById('popType').textContent = typeLabel;
    
    const isSaved = notebook.find(n => n.word.toLowerCase() === word.toLowerCase());
    if (isSaved) {
      document.getElementById('saveBtn').textContent = '✓ Zaten Kaydedildi';
      document.getElementById('saveBtn').className = 'save-btn saved';
    } else {
      document.getElementById('saveBtn').textContent = '＋ Deftere Ekle';
      document.getElementById('saveBtn').className = 'save-btn';
    }
    
    document.getElementById('popBody').innerHTML = `
      <div class="popup-tr">${result.tr}</div>
      <div class="popup-syn"><strong>Eş Anlamlı</strong><br>${result.syn.join(' · ')}</div>
      <div class="popup-mnemonic">${result.mnemonic}</div>
    `;
    
  } catch(e) {
    document.getElementById('popBody').innerHTML = '<div class="popup-error">HATA BİLGİSİ: ' + e.message + '</div>';
    console.error("Gemini API Hatası:", e);
  }
}
function closePopup() {
  document.getElementById('popup').classList.remove('open');
  document.querySelectorAll('.word.active').forEach(w => w.classList.remove('active'));
  currentWord = null;
}

// ─── SAVE WORD ────────────────────────────────────────────────
function saveWord() {
  if (!currentData || !currentWord) return;
  
  const exists = notebook.find(n => n.word.toLowerCase() === currentWord.toLowerCase());
  if (exists) return;
  
  const typeMap = {'Verb':'verb','Adjective':'adj','Adverb':'adv','Conjunction':'conj','Other':'other'};
  
  const entry = {
    word: currentWord,
    tr: currentData.tr,
    syn: currentData.syn,
    mnemonic: currentData.mnemonic,
    type: typeMap[currentData.type] || 'other',
    unit: PASSAGES[currentUnit].title,
    savedAt: Date.now()
  };
  
  notebook.push(entry);
  localStorage.setItem('rw_notebook', JSON.stringify(notebook));
  
  // Update UI
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = '✓ Kaydedildi!';
  saveBtn.className = 'save-btn saved';
  
  // Mark word in text
  document.querySelectorAll(`[data-w="${currentWord}"]`).forEach(el => {
    el.classList.add('saved-' + entry.type);
  });
  
  updateNbBadge();
  updateDrawerCounts();
  
  setTimeout(closePopup, 700);
}

function updateNbBadge() {
  const count = notebook.length;
  const badge = document.getElementById('nbCount');
  badge.style.display = count > 0 ? 'flex' : 'none';
  badge.textContent = count;
}

function updateDrawerCounts() {
  PASSAGES.forEach((p, i) => {
    const el = document.getElementById('di-' + i);
    if (!el) return;
    const saved = notebook.filter(w => w.unit === p.title).length;
    let countEl = el.querySelector('.di-count');
    if (saved > 0) {
      if (!countEl) {
        countEl = document.createElement('div');
        countEl.className = 'di-count';
        el.appendChild(countEl);
      }
      countEl.textContent = saved + ' kelime kaydedildi';
    } else if (countEl) {
      countEl.remove();
    }
  });
}

// ─── NAVIGATION ───────────────────────────────────────────────
function nextUnit() { if (currentUnit < PASSAGES.length-1) loadUnit(currentUnit+1); }
function prevUnit() { if (currentUnit > 0) loadUnit(currentUnit-1); }

// ─── DRAWER ───────────────────────────────────────────────────
function openDrawer() { document.getElementById('drawer').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }

// ─── NOTEBOOK ─────────────────────────────────────────────────
function openNotebook() {
  document.getElementById('notebook').classList.add('open');
  switchNbTab(nbTab);
}
function closeNotebook() { document.getElementById('notebook').classList.remove('open'); }

function switchNbTab(tab) {
  nbTab = tab;
  ['verb','adj','adv','conj','other'].forEach(t => {
    const btn = document.getElementById('nbt-' + t);
    btn.className = 'nb-tab' + (t === tab ? ' active-' + t : '');
  });
  renderNotebook();
}

function renderNotebook() {
  const words = notebook.filter(w => w.type === nbTab);
  const scroll = document.getElementById('nbScroll');
  const quizBtn = document.getElementById('nbQuizBtn');
  
  quizBtn.style.display = words.length >= 2 ? 'block' : 'none';
  
  if (words.length === 0) {
    scroll.innerHTML = `<div class="nb-empty"><div class="ne-icon">📭</div>Bu kategoride henüz kelime yok.<br>Okurken kelimelere tıkla ve deftere ekle!</div>`;
    return;
  }
  
  const typeLabel = {verb:'Fiil',adj:'Sıfat',adv:'Zarf',conj:'Bağlaç',other:'Diğer'};
  scroll.innerHTML = `<div style="font-size:0.72rem;color:var(--text-dimmer);margin-bottom:10px;letter-spacing:1px">${words.length} ${typeLabel[nbTab].toUpperCase()} KAYDEDİLDİ</div>` +
    words.map((w, i) => `
    <div class="nb-card t-${w.type}" style="animation-delay:${i*0.04}s">
      <button class="nb-delete" onclick="deleteWord(${notebook.indexOf(w)})">✕</button>
      <div class="nc-word">${w.word}</div>
      <div class="nc-tr">${w.tr}</div>
      <div class="nc-syn">≈ ${w.syn.join(' · ')}</div>
      <div class="nc-tip">${w.mnemonic}</div>
      <div class="nc-from">📖 ${w.unit}</div>
    </div>
  `).join('');
}

function deleteWord(idx) {
  notebook.splice(idx, 1);
  localStorage.setItem('rw_notebook', JSON.stringify(notebook));
  updateNbBadge();
  updateDrawerCounts();
  renderNotebook();
}

function clearNotebook() {
  if (!confirm('Tüm kelimeler silinsin mi?')) return;
  notebook = [];
  localStorage.setItem('rw_notebook', JSON.stringify(notebook));
  updateNbBadge();
  updateDrawerCounts();
  renderNotebook();
}

// ─── QUIZ ─────────────────────────────────────────────────────
function startQuiz() {
  const pool = notebook.filter(w => w.type === nbTab);
  if (pool.length < 2) return;
  quizScore = 0; quizTotal = 0;
  document.getElementById('quizModal').classList.add('open');
  const label = {verb:'FİİL',adj:'SIFAT',adv:'ZARF',conj:'BAĞLAÇ',other:'DİĞER'};
  document.getElementById('qmLabel').textContent = label[nbTab] + ' QUİZİ';
  nextQuizQ(pool);
}

function nextQuizQ(pool) {
  const q = pool[Math.floor(Math.random() * pool.length)];
  const wrong = pool.filter(w => w.tr !== q.tr).sort(() => Math.random()-0.5).slice(0,3).map(w => w.tr);
  const opts = [...wrong, q.tr].sort(() => Math.random()-0.5);
  
  document.getElementById('qmWord').textContent = q.word;
  document.getElementById('qmResult').textContent = '';
  document.getElementById('qmScore').textContent = `Skor: ${quizScore}/${quizTotal}`;
  document.getElementById('qmOpts').innerHTML = opts.map(o =>
    `<button class="qm-opt" onclick="checkQ(this,\'${o.replace(/\'/g,"\\'")}\',...arguments[0], \'${q.tr.replace(/\'/g,"\\'")}\')">${o}</button>`
  ).join('');
  
  // Fix onclick
  document.querySelectorAll('.qm-opt').forEach(btn => {
    const opt = btn.textContent.trim();
    btn.onclick = () => checkQ(btn, opt, q.tr, pool);
  });
}

function checkQ(btn, chosen, correct, pool) {
  quizTotal++;
  document.querySelectorAll('.qm-opt').forEach(b => b.onclick = null);
  if (chosen === correct) {
    btn.classList.add('correct');
    document.getElementById('qmResult').textContent = '✅ Doğru!';
    quizScore++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.qm-opt').forEach(b => { if(b.textContent.trim()===correct) b.classList.add('correct'); });
    document.getElementById('qmResult').textContent = '❌ Doğrusu: ' + correct;
  }
  document.getElementById('qmScore').textContent = `Skor: ${quizScore}/${quizTotal}`;
  setTimeout(() => nextQuizQ(pool), 1600);
}

function closeQuiz() { document.getElementById('quizModal').classList.remove('open'); }

// ─── BOOT ─────────────────────────────────────────────────────
init();
</script>
</body>
